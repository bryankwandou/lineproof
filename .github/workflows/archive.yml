name: scan-archive

# Keeps LineProof's forensic archive growing. Every run asks the live agent to
# audit the feed and anchor the digest on Solana, then commits the returned
# report to history/ so /api/replay and /api/verify have a durable record to
# compare against. No human is in the loop.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: scan-archive
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pull a fresh anchored scan from the live agent
        env:
          SCAN_URL: ${{ vars.SCAN_URL || 'https://lineproof-rho.vercel.app/api/scan' }}
        run: |
          set -euo pipefail
          curl -sS -m 60 "$SCAN_URL" -o scan.json
          jq -e '.ok == true and .report.scanId' scan.json > /dev/null

      - name: Append the report to the archive
        run: |
          set -euo pipefail
          mkdir -p history
          SCAN_ID=$(jq -r '.report.scanId' scan.json)
          jq '.report' scan.json > "history/${SCAN_ID}.json"

          # Prepend a compact row to the newest-first index, dedupe by scanId,
          # and keep it bounded so the file stays cheap to fetch.
          ROW=$(jq -c '{
            scanId: .report.scanId,
            digest: .scanDigest,
            matches: .report.matches,
            flagged: .report.flagged,
            anchored: (.anchor.anchored // false),
            signature: (.anchor.signature // "")
          }' scan.json)

          if [ ! -f history/index.json ]; then echo "[]" > history/index.json; fi
          jq --argjson row "$ROW" \
             '([$row] + map(select(.scanId != $row.scanId)))[:200]' \
             history/index.json > history/index.tmp.json
          mv history/index.tmp.json history/index.json
          rm -f scan.json
          echo "archived $SCAN_ID"

      - name: Commit
        run: |
          set -euo pipefail
          SCAN_ID=$(jq -r '.[0].scanId' history/index.json)
          git config user.name "lineproof-agent"
          git config user.email "agent@lineproof.local"
          git add history/
          if git diff --cached --quiet; then
            echo "no change"; exit 0
          fi
          git commit -m "archive: ${SCAN_ID}"
          git push
